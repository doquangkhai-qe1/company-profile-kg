# Universe = listed Vietnamese companies (banks + selected non-banks). `aliases` seed
# the name->ticker resolver (the crawler enriches them with names found on CafeF/
# Vietstock). `website` is the company IR page crawled in addition to the aggregators
# (optional — Vietstock works off the {ticker} alone). `cafef_url` is optional (needs a
# per-company slug). Keep aliases lowercase-ish; the resolver normalises (lowercase +
# strip diacritics) before matching.

